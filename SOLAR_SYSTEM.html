<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Solar System</title>

<style>

/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* Body */
body{
    background:black;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

/* Stars Background */
.stars{
    position:absolute;
    width:100%;
    height:100%;
    background:
        radial-gradient(2px 2px at 20px 30px, white, transparent),
        radial-gradient(1px 1px at 100px 150px, white, transparent),
        radial-gradient(2px 2px at 200px 80px, white, transparent),
        radial-gradient(1px 1px at 300px 200px, white, transparent),
        radial-gradient(2px 2px at 400px 100px, white, transparent),
        radial-gradient(1px 1px at 500px 50px, white, transparent);
    background-size:600px 300px;
    animation:starsMove 60s linear infinite;
}

/* Star Animation */
@keyframes starsMove{
    from{ background-position:0 0; }
    to{ background-position:1000px 500px; }
}

/* Solar System */
.solar{
    position:relative;
    width:500px;
    height:500px;
}

/* Sun */
.sun{
    width:80px;
    height:80px;
    background:radial-gradient(circle, yellow, orange);
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 0 50px orange;
}

/* Orbit */
.orbit{
    position:absolute;
    border:1px dashed rgba(255,255,255,0.2);
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    animation:spin linear infinite;
}

/* Planet */
.planet{
    width:15px;
    height:15px;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:100%;
    transform:translate(-50%,-50%);
}

/* Orbit Rotation */
@keyframes spin{
    from{
        transform:translate(-50%,-50%) rotate(0deg);
    }
    to{
        transform:translate(-50%,-50%) rotate(360deg);
    }
}

/* Mercury */
.mercury{
    width:120px;
    height:120px;
    animation-duration:5s;
}
.mercury .planet{
    background:gray;
    width:8px;
    height:8px;
}

/* Venus */
.venus{
    width:170px;
    height:170px;
    animation-duration:8s;
}
.venus .planet{
    background:#c9a36b;
}

/* Earth */
.earth{
    width:220px;
    height:220px;
    animation-duration:12s;
}
.earth .planet{
    background:dodgerblue;
}

/* Mars */
.mars{
    width:270px;
    height:270px;
    animation-duration:16s;
}
.mars .planet{
    background:#c1440e;
}

/* Jupiter */
.jupiter{
    width:330px;
    height:330px;
    animation-duration:22s;
}
.jupiter .planet{
    background:#d2b48c;
    width:22px;
    height:22px;
}

/* Saturn */
.saturn{
    width:390px;
    height:390px;
    animation-duration:28s;
}
.saturn .planet{
    background:#deb887;
    width:18px;
    height:18px;
    position:relative;
}

/* Saturn Ring */
.saturn .planet::after{
    content:"";
    position:absolute;
    width:35px;
    height:7px;
    border:2px solid rgba(255,255,255,0.6);
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) rotate(25deg);
}

/* Uranus */
.uranus{
    width:440px;
    height:440px;
    animation-duration:34s;
}
.uranus .planet{
    background:lightblue;
}

/* Neptune */
.neptune{
    width:490px;
    height:490px;
    animation-duration:40s;
}
.neptune .planet{
    background:blue;
}

</style>
</head>

<body>

<!-- Stars -->
<div class="stars"></div>

<!-- Solar System -->
<div class="solar">

    <div class="sun"></div>

    <div class="orbit mercury">
        <div class="planet"></div>
    </div>

    <div class="orbit venus">
        <div class="planet"></div>
    </div>

    <div class="orbit earth">
        <div class="planet"></div>
    </div>

    <div class="orbit mars">
        <div class="planet"></div>
    </div>

    <div class="orbit jupiter">
        <div class="planet"></div>
    </div>

    <div class="orbit saturn">
        <div class="planet"></div>
    </div>

    <div class="orbit uranus">
        <div class="planet"></div>
    </div>

    <div class="orbit neptune">
        <div class="planet"></div>
    </div>

</div>

</body>
</html>
